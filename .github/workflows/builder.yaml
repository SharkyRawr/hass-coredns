---
# yamllint disable rule:line-length rule:truthy
name: Build add-on

env:
  MONITORED_FILES: "config.json config.yaml config.yml Dockerfile rootfs"

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  init:
    name: Initialize builds
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
      changed_addons: ${{ steps.filter.outputs.changed_addons }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Get changed files
        id: changed_files
        uses: tj-actions/changed-files@v47

      - name: Find add-on directories
        id: addons
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Filter changed add-ons
        id: filter
        env:
          ADDONS: ${{ steps.addons.outputs.addons }}
          CHANGED_FILES: ${{ steps.changed_files.outputs.all_changed_files }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          changed_addons=()

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            changed_addons=(${ADDONS})
          elif [[ "${CHANGED_FILES}" =~ \.github/workflows/(builder|build-addon)\.yaml ]]; then
            changed_addons=(${ADDONS})
          else
            for addon in ${ADDONS}; do
              for file in ${MONITORED_FILES}; do
                if [[ "${CHANGED_FILES}" =~ ${addon}/${file} ]]; then
                  changed_addons+=("${addon}")
                  break
                fi
              done
            done
          fi

          if [[ ${#changed_addons[@]} -gt 0 ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "changed_addons=$(jq -nc '$ARGS.positional' --args "${changed_addons[@]}")" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-addon:
    name: Build ${{ matrix.addon }}
    needs: init
    if: needs.init.outputs.changed == 'true'
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.init.outputs.changed_addons) }}
    uses: ./.github/workflows/build-addon.yaml
    with:
      addon: ${{ matrix.addon }}
      publish: ${{ github.event_name == 'push' }}
    secrets: inherit

  comment:
    needs: [init, build-addon]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request' && needs.init.outputs.changed == 'true'
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Comment PR
        uses: actions/github-script@v9
        with:
          script: |
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            const buildJobs = jobs.jobs.filter((job) => job.name.includes('Build'));
            const successful = buildJobs.filter((job) => job.conclusion === 'success').length;
            const failed = buildJobs.filter((job) => job.conclusion === 'failure').length;
            const skipped = buildJobs.filter((job) => job.conclusion === 'skipped').length;

            const body = `## Add-on Build Results

            - **Successful**: ${successful}
            - **Failed**: ${failed}
            - **Skipped**: ${skipped}

            ${failed > 0 ? 'Some builds failed. Check the logs for details.' : 'All builds completed successfully.'}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
